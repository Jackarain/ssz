name: CI

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        compiler:
          - cc: gcc
            cxx: g++
          - cc: clang
            cxx: clang++
        exclude:
          # macOS 上默认编译器就是 clang，跳过 clang 重复构建
          - os: macos-latest
            compiler:
              cc: clang
              cxx: clang++
          # Windows 上使用 MSVC（通过 include 添加），跳过 gcc/clang
          - os: windows-latest
            compiler:
              cc: gcc
              cxx: g++
          - os: windows-latest
            compiler:
              cc: clang
              cxx: clang++
        include:
          # Windows 使用 MSVC 工具链
          - os: windows-latest
            compiler:
              cc: cl
              cxx: cl

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y -qq \
          cmake \
          libboost-test-dev \
          libboost-dev

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew update
        brew install boost

    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install boost-test boost-pfr

    - name: Configure CMake (Linux/macOS)
      if: runner.os != 'Windows'
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_C_COMPILER=${{ matrix.compiler.cc }} \
          -DCMAKE_CXX_COMPILER=${{ matrix.compiler.cxx }} \
          -DENABLE_SSZ_TESTS=ON \
          -DENABLE_SSZ_EXAMPLES=ON

    - name: Configure CMake (Windows/MSVC)
      if: runner.os == 'Windows'
      run: |
        cmake -B build `
          -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
          -DENABLE_SSZ_TESTS=ON `
          -DENABLE_SSZ_EXAMPLES=ON

    - name: Build
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel

    - name: Test
      working-directory: build
      run: ctest -C ${{ env.BUILD_TYPE }} --output-on-failure
